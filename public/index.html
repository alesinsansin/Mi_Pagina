<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renta de Audio</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<h1>Sistema de Renta de Audio</h1>

<div class="card">

<h2 id="tituloFormulario">Registrar Evento</h2>

<form id="formulario">

<input type="hidden" id="eventoId">

<input id="cliente" placeholder="Nombre del Cliente" required>

<input id="tipoEvento" placeholder="Tipo de Evento" required>

<input id="fecha" type="date" required>

<input id="equipo" placeholder="Equipo Solicitado" required>

<input id="direccion" placeholder="Dirección" required>

<input id="telefono" placeholder="Teléfono" required>

<select id="estado">
<option>Pendiente</option>
<option>Confirmada</option>
<option>Cancelada</option>
</select>

<button type="submit" id="btnGuardar">Guardar Evento</button>

</form>

</div>

<div class="card">

<h2>Eventos Registrados</h2>

<table>
<thead>
<tr>
<th>Cliente</th>
<th>Evento</th>
<th>Fecha</th>
<th>Equipo</th>
<th>Teléfono</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody id="tablaEventos"></tbody>
</table>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
